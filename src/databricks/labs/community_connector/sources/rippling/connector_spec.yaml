# Rippling Community Connector Spec
# This file defines the specification for the connector including
# connection parameters and allowlist options.

# ============================================================================
# Connection Parameters
# These are provided when creating the Unity Catalog connection.
# The Databricks UI reads this list to render the credential prompt form.
# ============================================================================
display_name: Rippling
connection:
  parameters:
    - name: api_token
      type: string
      required: true
      secret: true
      description: >
        API token generated from the Rippling admin console. Navigate to
        Admin > Settings > API Tokens, then click Create API Token.
        The token is sent as "Authorization: Bearer <api_token>" on every request.
        Tokens expire after 30 days of inactivity.
        Ensure the token has read scopes for all resources you intend to sync.
        Common required scopes: companies.read, workers.read, users.read,
        departments.read, teams.read, custom-fields.read.

    - name: base_url
      type: string
      required: false
      description: >
        Rippling REST API base URL. Defaults to https://rest.ripplingapis.com.
        For sandbox environments, use https://rest.ripplingsandboxapis.com.
        Only override if your Rippling account uses a custom endpoint.

    - name: api_version
      type: string
      required: false
      description: >
        Optional API version header (Rippling-Api-Version) in YYYY-MM-DD format
        (e.g., 2023-08-01). If not specified, requests use the default version
        associated with the token. Specify this to pin a specific API version
        and prevent unintended breakage from version upgrades.

# ============================================================================
# External Options Allowlist
# Table-specific options that can be passed through from the UC connection.
# This connector has no table-specific connection options.
# ============================================================================
external_options_allowlist: ""
